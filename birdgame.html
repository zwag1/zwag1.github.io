from browser import document, window, aio
import random,math

PIXI = window.PIXI


def mousepos(app):
    pos = app.renderer.events.pointer.getLocalPosition(app.stage)
    return pos.x, pos.y


async def main():
    global texture,app
    # Create a new application
    app = PIXI.Application.new()
    # Initialize the application
    await app.init({"background": '#66ee66', "resizeTo": window})
    # Append the application canvas to the document body
    document.body.appendChild(app.canvas)

    

    # Create and add a container to the stage
    container = PIXI.Container.new()
    app.stage.addChild(container)
    
    style = {
        'fontFamily': 'Arial',
        'fontSize': 30,
        'fill': 'black',
        'fontWeight': 'normal'}
    text_sprite = window.PIXI.Text.new('Happy Mother\'s day!\n I appreciate you.\nThank you for everything that you do to help me succeed and grow;\n it does not go unnoticed.\n\n Enjoy the birds, they are scared of the mouse.', style)
    text_sprite.x = app.screen.width/2-220
    text_sprite.y = app.screen.height/2-30
    app.stage.addChild(text_sprite)    
    # Load the bunny texture, using a remote address
    # texture = await PIXI.Assets.load('https://pixijs.com/assets/bunny.png')

    # Load the bunny texture, using the local image database
    texture1 = await PIXI.Assets.load(window.IMAGES['bunny'])
    texture2 = await PIXI.Assets.load(window.IMAGES['b2'])
    texture3 = await PIXI.Assets.load(window.IMAGES['b3'])
    texture4 = await PIXI.Assets.load(window.IMAGES['b4'])
    textures = [texture1,texture2,texture3,texture4]
    
    birds = []
    for i in range(100):
        birds.append(Bird(random.randint(0,app.screen.width),
                          random.randint(0,app.screen.height),
                          texture1))

    for i in birds:
        app.stage.addChild(i.bird)

   
    
    def animate(time):
        for i in birds:
            i.update()
        
    
    app.ticker.add(animate)


class Bird:
    def __init__(self,x,y,tex):
        global app
        self.x = x
        self.y = y
        self.tx = x
        self.panic = False
        self.unease = False
        self.ty = y
        self.bird = PIXI.Sprite.new(tex)
        self.bird.pivot.x = self.bird.width/2
        self.bird.pivot.y = self.bird.height/2
        
    def update(self):
        self.bird.x = self.x
        self.bird.y = self.y
        if self.unease:
            self.bird.rotation = 0
        self.mousex,self.mousey = mousepos(app)
        self.mousedist = math.sqrt((self.x-self.mousex)**2+(self.y-self.mousey)**2)
        if self.mousedist < 75 and self.panic == False:
            self.tx = random.randint(0,app.screen.width)
            self.ty = random.randint(0,app.screen.height)
            self.panic = True
        if self.mousedist > 150 and math.sqrt((self.x-self.tx)**2+(self.y-self.ty)**2) < 5:
            self.panic = False
        if self.mousedist < 225:
            self.unease = True
        if self.mousedist > 300:
            self.unease = False
            
        if not self.unease and random.randint(0,10) == 0:
            self.bird.rotation +=  random.triangular(-1,1)
        if not self.unease and random.randint(0,10) == 0:
            self.x += random.triangular(-10,10)
            self.y += random.triangular(-10,10)
        if (self.tx != self.x or self.ty != self.y) and self.panic:
            if math.sqrt((self.x-self.tx)**2+(self.y-self.ty)**2) < 5:
                self.x = self.tx
                self.y = self.ty
                self.panic = False
                
            else:
                vl = math.sqrt((self.x-self.tx)**2+(self.y-self.ty)**2)
                uvx = ((self.tx - self.x)/vl)*5
                uvy = ((self.ty - self.y)/vl)*5
                self.x += uvx
                self.y += uvy

    

    
        

        


# Start the async main function
aio.run(main())
